name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: run tests
        run: node --test
